<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenReads | Favorites</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">
    <nav class="bg-gray-800 p-4 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="flex justify-between items-center w-full md:w-auto">
                <h1 class="text-2xl font-bold tracking-tight border-b-2 border-emerald-500 pb-1">OpenReads</h1>
                
                <button id="menu-toggle" class="md:hidden flex items-center px-3 py-2 border rounded border-white hover:text-emerald-400 hover:border-emerald-400">
                    <svg class="fill-current h-4 w-4" viewBox="0 0 20 20"><path d="M0 3h20v2H0V3zm0 6h20v2H0V9zm0 6h20v2H0v-2z"/></svg>
                </button>
            </div>

  <div id="nav-links" class="visibility: visible lg:flex md:flex  flex-row space-x-4 mt-4 md:mt-0 md:space-x-8">
                <a href="index.html" class="text-white hover:text-emerald-400 transition hover:underline decoration-2 underline-offset-4">Home</a>
                <a href="about.html" class="text-white hover:text-emerald-400 transition hover:underline decoration-2 underline-offset-4">About</a>
                <a href="favorites.html" class="text-emerald-400 font-semibold transition underline decoration-2 underline-offset-4">Favorites</a>
            </div>
            </div>
    </nav>
 <main class="container mx-auto py-12 px-4 flex-grow">
        <header class="text-center mb-12">
            <h2 class="text-4xl font-extrabold text-gray-800 mb-2">Your Literary Collection</h2>
            <p class="text-emerald-600 font-medium italic">Books you've marked as must-reads</p>
            <div class="w-24 h-1 bg-amber-400 mx-auto mt-4 rounded-full"></div>
        </header>

        <div id="favoriteGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
            <div class="col-span-full text-center py-20 bg-amber-50 rounded-2xl border-2 border-dashed border-amber-200">
                <i class="fa-solid fa-book-open text-amber-300 text-5xl mb-4"></i>
                <p class="text-amber-800 text-lg font-medium">Your shelf is empty!</p>
                <p class="text-amber-600 text-sm mt-1 mb-6">Go back to Home to add books you love.</p>
                <a href="index.html" class="inline-block bg-emerald-600 text-white px-6 py-2 rounded-lg hover:bg-emerald-700 transition shadow-md">
                    Browse Books
                </a>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-gray-400 py-8 mt-auto border-t border-gray-700">
        <div class="container mx-auto text-center">
            <p>&copy; 2026 <span class="text-white font-semibold">OpenReads</span> Capstone. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Navbar toggle script
        const btn = document.getElementById('menu-toggle');
        const nav = document.getElementById('nav-links');
        btn.addEventListener('click', () => {
            nav.classList.toggle('hidden');
            nav.classList.toggle('flex');
            nav.classList.toggle('flex-col');
        });
    </script>
    <script type="module" src="./JavaScript/favorite.js"></script>
</body>

</html>
