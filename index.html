<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenReads</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">
   <nav class="bg-gray-800 p-4 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="flex justify-between items-center w-full md:w-auto">
                <h1 class="text-2xl font-bold tracking-tight">Free Library</h1>
            </div>

            <div class="flex flex-row space-x-4 mt-4 md:mt-0 md:space-x-6">
                <a href="index.html" class="text-white hover:text-blue-300 hover:underline transition"> Home</a>
               <a href="about.html" class="text-white hover:text-blue-300 hover:underline transition">About</a>
               <a href="favorites.html" class="text-white hover:text-blue-300 hover:underline transition">Favorites</a>
                
            </div>
        </div>
    </nav>


    <header class="bg-white py-12 border-b">
        <div class="container mx-auto text-center px-4">
            <h2 class="text-4xl font-extrabold text-gray-800 mb-4">Find your next great read.</h2>
            <div class="max-w-md mx-auto flex gap-2">
                <input id="searchInput" type="text" placeholder="Search by title..."
                    class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="searchBtn"
                    class="bg-gray-800 text-white px-6 py-3 rounded-lg hover:bg-gray-900 transition">Search</button>
            </div>
        </div>
    </header>

    <main class="container mx-auto py-10 px-4 flex-grow">
        <div id="bookGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <p class="text-gray-500 col-span-full text-center">Your Searches Will Appear Here...</p>
        </div>
    </main>

    <footer class="bg-gray-800 text-gray-300 py-6 mt-auto">
        <div class="container mx-auto text-center">
            <p>&copy; 2024 Book Explorer Capstone. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="./JavaScript/main.js"></script>
</body>

</html>
